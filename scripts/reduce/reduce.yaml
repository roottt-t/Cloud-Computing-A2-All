apiVersion: v1
kind: Namespace
metadata:
  name: reduce
---
# apiVersion: v1
# kind: Secret
# type: kubernetes.io/dockerconfigjson
# data:
#   .dockerconfigjson: >-
#     
# metadata:
#   name: demosecret
#   namespace: default-1750757853349
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: videoprocess-reduce-app
  namespace: reduce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: videoprocess-reduce-app
  template:
    metadata:
      labels:
        app: videoprocess-reduce-app
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      # imagePullSecrets:
      #   - name: demosecret
      containers:
        - name: videoprocess-reduce-app
          image: videoprocessregistrywatermark.azurecr.io/videoprocess-reduce-app:latest
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: videoprocess-reduce-app-service
  namespace: reduce
spec:
  type: LoadBalancer
  ports:
    - targetPort: 80
      name: port80
      port: 80
      protocol: TCP
  selector:
    app: videoprocess-reduce-app
